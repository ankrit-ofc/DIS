<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pill Navbar</title>
    <style>
      :root {
        --bg: #f4f6fb;
        --nav-bg: #f6f8fb;
        --nav-border: #e6e8ef;
        --text: #0f172a;
        --muted: #475569;
        --active-bg: #ffffff;
        --active-text: #3b82f6;
        --hover-bg: rgba(15, 23, 42, 0.04);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        padding: 0;
        min-height: 100%;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, "Inter", sans-serif;
        background:
          radial-gradient(1200px 600px at 50% -10%, #eaf0ff 0%, transparent 60%),
          var(--bg);
        color: var(--text);
        -webkit-font-smoothing: antialiased;
        display: flex;
        align-items: flex-start;
        justify-content: center;
        padding: 4rem 1rem;
      }

      nav.pill-nav {
        display: flex;
        align-items: center;
        gap: 0.25rem;
        padding: 0.375rem;
        background: var(--nav-bg);
        border: 1px solid var(--nav-border);
        border-radius: 999px;
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.04),
          0 10px 30px rgba(15, 23, 42, 0.08);
        max-width: 100%;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
      }

      nav.pill-nav::-webkit-scrollbar {
        display: none;
      }

      nav.pill-nav a {
        position: relative;
        flex: 0 0 auto;
        padding: 0.625rem 1.25rem;
        border-radius: 999px;
        font-size: 0.9375rem;
        font-weight: 500;
        color: var(--text);
        text-decoration: none;
        white-space: nowrap;
        line-height: 1;
        transition:
          background-color 0.2s ease,
          color 0.2s ease,
          box-shadow 0.2s ease,
          transform 0.2s ease;
      }

      nav.pill-nav a:hover {
        background: var(--hover-bg);
      }

      nav.pill-nav a:focus-visible {
        outline: 2px solid var(--active-text);
        outline-offset: 2px;
      }

      nav.pill-nav a.active {
        background: var(--active-bg);
        color: var(--active-text);
        font-weight: 700;
        box-shadow:
          0 1px 2px rgba(15, 23, 42, 0.06),
          0 6px 16px rgba(59, 130, 246, 0.18);
      }

      nav.pill-nav a.active:hover {
        background: var(--active-bg);
      }

      @media (max-width: 480px) {
        nav.pill-nav {
          width: 100%;
          justify-content: flex-start;
        }
        nav.pill-nav a {
          padding: 0.5625rem 1rem;
          font-size: 0.875rem;
        }
      }
    </style>
  </head>
  <body>
    <nav class="pill-nav" aria-label="Primary">
      <a href="#home" class="active" aria-current="page">Home</a>
      <a href="#about">About</a>
      <a href="#products">Products</a>
      <a href="#contact">Contact Us</a>
    </nav>
  </body>
</html>
